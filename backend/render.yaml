services:
  - type: web
    name: revive-market-api
    env: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: revive_market
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@revivemarket.com
      - key: SMTP_FROM_NAME
        value: REVIVE MARKET
      - key: CORS_ORIGIN
        sync: false
